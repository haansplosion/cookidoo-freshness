name: Scrape Cookidoo

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:        # Manual trigger from Actions tab

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Scrape Cookidoo
        env:
          COOKIDOO_EMAIL: ${{ secrets.COOKIDOO_EMAIL }}
          COOKIDOO_PASSWORD: ${{ secrets.COOKIDOO_PASSWORD }}
        run: node scripts/scrape.js

      - name: Commit updated data
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/cook-history.json
          git diff --staged --quiet || git commit -m 'chore: update cook history [skip ci]'
          git push
